<!DOCTYPE html>
<html>
<head>
    <title>Secret Page</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .secret-container{
            max-width:1100px;
            margin:auto;
            padding:40px;
            text-align:center;
        }

        .secret-title{
            font-family:'Great Vibes', cursive;
            font-size:3.5rem;
            color:#8b355f;
            margin-bottom:30px;
        }

        /* 2 CLEAN ROWS */
        .secret-grid{
            display:grid;
            grid-template-columns:repeat(5, 1fr);
            gap:20px;
        }

        .secret-box{
            height:180px;
            border-radius:18px;
            border:2px solid #f3a6c8;
            overflow:hidden;
            background:#ffe6f0;
            box-shadow:0 8px 20px rgba(243, 166, 200, 0.25);
            transition:0.3s ease;
        }

        .secret-box:hover{
            transform:scale(1.05);
        }

        .secret-box img{
            width:100%;
            height:100%;
            object-fit:cover;
            display:block;
        }

        .back-btn{
            display:inline-block;
            margin-top:30px;
            padding:12px 30px;
            background:linear-gradient(135deg,#d16ba5,#c44569);
            color:white;
            text-decoration:none;
            border-radius:50px;
            font-weight:600;
        }
    </style>
</head>

<body>

<div class="secret-container">

    <div class="secret-title">Things you like (including me ahahaha) </div>

    <div class="secret-grid">

        <!-- ROW 1 -->
        <div class="secret-box"><img src="images/a.jpg"></div>
        <div class="secret-box"><img src="images/b.png"></div>
        <div class="secret-box"><img src="images/c.png"></div>
        <div class="secret-box"><img src="images/d.jfif"></div>
        <div class="secret-box"><img src="images/e.jpg"></div>

        <!-- ROW 2 -->
        <div class="secret-box"><img src="images/f.png"></div>
        <div class="secret-box"><img src="images/g.png"></div>
        <div class="secret-box"><img src="images/h.png"></div>
        <div class="secret-box"><img src="images/i.jpg"></div>
        <div class="secret-box"><img src="images/j.png"></div>

    </div>

    <a href="page2.html" class="back-btn">← Back</a>

</div>

</body>
</html>
